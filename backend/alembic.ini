# A generic, single database configuration.

[alembic]
# path to migration scripts.
script_location = %(here)s/migrations

# sys.path path, will be prepended to sys.path if present.
prepend_sys_path = .

# path separator (os = os.pathsep)
path_separator = os

# C6 FIX: Removed placeholder sqlalchemy.url.
# The actual database URL is set in migrations/env.py from app.core.config.settings.DATABASE_URL.
# This prevents accidental migrations against a wrong database.


[post_write_hooks]

# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S